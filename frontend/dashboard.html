<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus CRM - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-decor">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="logo">NEXUS <span>CRM</span></div>
      
      <div class="header-controls">
        <div class="lang-select-wrapper">
          <label for="lang-toggle" data-i18n="language-label">Language:</label>
          <select id="lang-toggle" class="select-field">
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>

        <div class="user-pill">
          <span id="header-user-email">Loading...</span>
          <span class="badge" id="header-user-role">Role</span>
          <button id="logout-btn" class="btn btn-sm btn-danger" data-i18n="logout-btn">Logout</button>
        </div>
      </div>
    </header>

    <div class="dashboard-grid">
      <aside class="sidebar-panel">
        <div class="glass-card panel-card">
          <h3 data-i18n="my-profile">My Profile</h3>
          <div id="profile-success" class="success-msg hidden" data-i18n="profile-updated">Profile updated</div>
          <form id="profile-form">
            <div class="input-group">
              <label data-i18n="first-name">First Name</label>
              <div class="static-val" id="prof-first-name">-</div>
            </div>
            <div class="input-group">
              <label data-i18n="last-name">Last Name</label>
              <div class="static-val" id="prof-last-name">-</div>
            </div>
            <div class="input-group" id="prof-student-id-group">
              <label data-i18n="student-id-label-short">Student ID / JSN</label>
              <div class="static-val" id="prof-student-id">-</div>
            </div>
            <div class="input-group">
              <label for="prof-skills" data-i18n="skills-label">Skills (Comma-separated)</label>
              <input type="text" id="prof-skills" data-i18n-placeholder="placeholder-skills" placeholder="Python, SQL, JS">
            </div>
            <div class="input-group">
              <label for="prof-bio" data-i18n="bio-label">Short Bio</label>
              <textarea id="prof-bio" rows="2" data-i18n-placeholder="placeholder-bio" placeholder="Tell us about yourself"></textarea>
            </div>
            <button type="submit" class="btn btn-sm btn-primary" data-i18n="save-profile">Save Profile</button>
          </form>
        </div>

        <div class="glass-card panel-card" id="team-section">
          <h3 data-i18n="team-management">Team Management</h3>
          <div id="current-team-info" class="team-info-box" data-i18n="loading-team">
            Loading team info...
          </div>
          
          <div class="create-team-box hidden" id="create-team-container">
            <h4 data-i18n="create-team">Create Team</h4>
            <form id="create-team-form">
              <input type="text" id="new-team-name" data-i18n-placeholder="placeholder-teamname" placeholder="Team Name" required class="input-field-sm">
              <input type="text" id="new-team-skills" data-i18n-placeholder="placeholder-teamskills" placeholder="Desired Skills (e.g. JS, Python)" class="input-field-sm">
              <button type="submit" class="btn btn-sm btn-primary" data-i18n="create-one">Create</button>
            </form>
          </div>

          <div class="team-matching-box hidden" id="team-matching-container">
            <h4 data-i18n="recommended-teams">Recommended Teams</h4>
            <div id="recommended-teams-list" class="recommended-list">
            </div>
          </div>
        </div>
      </aside>

      <main class="main-content-panel">
        <div class="glass-card panel-card">
          <div class="panel-header-action">
            <h3 data-i18n="project-boards">Project Boards</h3>
            <button id="show-add-project-btn" class="btn btn-sm btn-primary hidden" data-i18n="add-project">Add Project</button>
          </div>

          <div class="modal-overlay hidden" id="project-modal">
            <div class="glass-card modal-card">
              <h4 id="project-modal-title" data-i18n="new-project">New Project</h4>
              <form id="project-form">
                <div class="input-group">
                  <label for="proj-title" data-i18n="title-label">Title</label>
                  <input type="text" id="proj-title" required data-i18n-placeholder="placeholder-projtitle" placeholder="Hogwarts CRM">
                </div>
                <div class="input-group">
                  <label for="proj-desc" data-i18n="description-label">Description</label>
                  <textarea id="proj-desc" rows="3" data-i18n-placeholder="placeholder-projdesc" placeholder="Project details"></textarea>
                </div>
                <div class="input-group">
                  <label for="proj-github" data-i18n="github-label">GitHub Repository URL</label>
                  <input type="text" id="proj-github" data-i18n-placeholder="placeholder-projgithub" placeholder="https://github.com/org/repo">
                </div>
                <div class="input-group">
                  <label for="proj-deadline" data-i18n="deadline-label">Deadline</label>
                  <input type="datetime-local" id="proj-deadline">
                </div>
                <div class="input-group">
                  <label for="proj-status" data-i18n="status-label">Status</label>
                  <select id="proj-status" class="select-field">
                    <option value="PLANNED" data-i18n="status-planned">Planned</option>
                    <option value="ACTIVE" data-i18n="status-active">Active</option>
                    <option value="COMPLETED" data-i18n="status-completed">Completed</option>
                  </select>
                </div>
                <div class="input-group">
                  <label for="proj-team" data-i18n="assigned-team">Assigned Team</label>
                  <select id="proj-team" class="select-field">
                    <option value="" data-i18n="unassigned-val">Unassigned</option>
                  </select>
                </div>
                <div class="btn-group">
                  <button type="submit" class="btn btn-primary" data-i18n="save-btn">Save</button>
                  <button type="button" id="close-project-modal-btn" class="btn btn-secondary" data-i18n="cancel-btn">Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <div id="projects-list-container" class="projects-grid">
          </div>
        </div>

        <div class="glass-card panel-card hidden" id="sprint-section">
          <div class="panel-header-action">
            <h3><span data-i18n="sprints-label-text">Sprints for:</span> <span id="active-project-title">-</span></h3>
            <button id="show-add-sprint-btn" class="btn btn-sm btn-primary hidden" data-i18n="add-sprint">Add Sprint</button>
          </div>

          <div class="modal-overlay hidden" id="sprint-modal">
            <div class="glass-card modal-card">
              <h4 data-i18n="new-sprint">New Sprint</h4>
              <form id="sprint-form">
                <div class="input-group">
                  <label for="sprint-name" data-i18n="sprint-name-label">Sprint Name</label>
                  <input type="text" id="sprint-name" required data-i18n-placeholder="placeholder-sprintname" placeholder="Sprint 1 - Authentication">
                </div>
                <div class="input-row">
                  <div class="input-group">
                    <label for="sprint-start" data-i18n="start-date">Start Date</label>
                    <input type="datetime-local" id="sprint-start" required>
                  </div>
                  <div class="input-group">
                    <label for="sprint-end" data-i18n="end-date">End Date</label>
                    <input type="datetime-local" id="sprint-end" required>
                  </div>
                </div>
                <div class="input-group">
                  <label for="sprint-status" data-i18n="status-label">Status</label>
                  <select id="sprint-status" class="select-field">
                    <option value="PLANNED" data-i18n="status-planned">Planned</option>
                    <option value="ACTIVE" data-i18n="status-active">Active</option>
                    <option value="COMPLETED" data-i18n="status-completed">Completed</option>
                  </select>
                </div>
                <div class="btn-group">
                  <button type="submit" class="btn btn-primary" data-i18n="save-btn">Save</button>
                  <button type="button" id="close-sprint-modal-btn" class="btn btn-secondary" data-i18n="cancel-btn">Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <div class="sprint-tabs-wrapper" id="sprints-tabs-list">
          </div>

          <div class="tasks-board-wrapper hidden" id="tasks-board-container">
            <div class="tasks-board-header">
              <h4 data-i18n="tasks-list">Tasks List</h4>
              <button id="show-add-task-btn" class="btn btn-sm btn-primary" data-i18n="add-task">Add Task</button>
            </div>

            <div class="modal-overlay hidden" id="task-modal">
              <div class="glass-card modal-card">
                <h4 id="task-modal-title" data-i18n="new-task">New Task</h4>
                <form id="task-form">
                  <div class="input-group">
                    <label for="task-title" data-i18n="title-label">Title</label>
                    <input type="text" id="task-title" required data-i18n-placeholder="placeholder-tasktitle" placeholder="API validation">
                  </div>
                  <div class="input-group">
                    <label for="task-desc" data-i18n="description-label">Description</label>
                    <textarea id="task-desc" rows="2" data-i18n-placeholder="placeholder-taskdesc" placeholder="Task details"></textarea>
                  </div>
                  <div class="input-group">
                    <label for="task-status" data-i18n="status-label">Status</label>
                    <select id="task-status" class="select-field">
                      <option value="TO_DO" data-i18n="status-to_do">To Do</option>
                      <option value="IN_PROGRESS" data-i18n="status-in_progress">In Progress</option>
                      <option value="REVIEW" data-i18n="status-review">Review</option>
                      <option value="DONE" data-i18n="status-done">Done</option>
                    </select>
                  </div>
                  <div class="input-group">
                    <label for="task-team" data-i18n="assigned-team">Assigned Team</label>
                    <select id="task-team" class="select-field">
                      <option value="" data-i18n="unassigned-val">Unassigned</option>
                    </select>
                  </div>
                  <div class="btn-group">
                    <button type="submit" class="btn btn-primary" data-i18n="save-btn">Save</button>
                    <button type="button" id="close-task-modal-btn" class="btn btn-secondary" data-i18n="cancel-btn">Cancel</button>
                  </div>
                </form>
              </div>
            </div>

            <div class="tasks-kanban-board">
              <div class="kanban-column" data-status="TO_DO">
                <h5 data-i18n="todo-col">To Do</h5>
                <div class="tasks-list" id="tasks-todo-list"></div>
              </div>
              <div class="kanban-column" data-status="IN_PROGRESS">
                <h5 data-i18n="inprogress-col">In Progress</h5>
                <div class="tasks-list" id="tasks-inprogress-list"></div>
              </div>
              <div class="kanban-column" data-status="REVIEW">
                <h5 data-i18n="review-col">Review</h5>
                <div class="tasks-list" id="tasks-review-list"></div>
              </div>
              <div class="kanban-column" data-status="DONE">
                <h5 data-i18n="done-col">Done</h5>
                <div class="tasks-list" id="tasks-done-list"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="translations.js"></script>
  <script src="app.js"></script>
</body>
</html>
