<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus CRM - Portal Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-decor">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="portal-container">
    <header class="portal-header">
      <div class="logo">NEXUS <span>CRM</span></div>
      <div class="lang-select-wrapper">
        <label for="lang-toggle" data-i18n="language-label">Language:</label>
        <select id="lang-toggle" class="select-field">
          <option value="en">English</option>
          <option value="ru">Русский</option>
        </select>
      </div>
    </header>

    <main class="portal-main">
      <div class="glass-card auth-card" id="login-card">
        <h2 data-i18n="welcome-back">Welcome Back</h2>
        <p class="subtitle" data-i18n="enter-credentials">Enter your credentials to access the tracking portal</p>
        <div id="login-error" class="error-msg hidden"></div>
        <form id="login-form">
          <div class="input-group">
            <label for="login-email" data-i18n="email-address">Email Address</label>
            <input type="email" id="login-email" required data-i18n-placeholder="placeholder-email" placeholder="name@domain.com">
          </div>
          <div class="input-group">
            <label for="login-password" data-i18n="password">Password</label>
            <input type="password" id="login-password" required data-i18n-placeholder="placeholder-password" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="sign-in">Sign In</button>
        </form>
        <div class="auth-switch">
          <span data-i18n="no-account">Don't have an account?</span> <span id="to-register-btn" data-i18n="create-one">Create one</span>
        </div>
      </div>

      <div class="glass-card auth-card hidden" id="register-card">
        <h2 data-i18n="create-account">Create Account</h2>
        <p class="subtitle" data-i18n="join-network">Join the Nexus student tracker network</p>
        <div id="register-error" class="error-msg hidden"></div>
        <form id="register-form">
          <div class="input-row">
            <div class="input-group">
              <label for="reg-first-name" data-i18n="first-name">First Name</label>
              <input type="text" id="reg-first-name" required data-i18n-placeholder="placeholder-firstname" placeholder="John">
            </div>
            <div class="input-group">
              <label for="reg-last-name" data-i18n="last-name">Last Name</label>
              <input type="text" id="reg-last-name" required data-i18n-placeholder="placeholder-lastname" placeholder="Doe">
            </div>
          </div>
          <div class="input-group">
            <label for="reg-email" data-i18n="email-address">Email Address</label>
            <input type="email" id="reg-email" required data-i18n-placeholder="placeholder-email" placeholder="name@domain.com">
          </div>
          <div class="input-group">
            <label for="reg-password" data-i18n="password">Password</label>
            <input type="password" id="reg-password" required data-i18n-placeholder="placeholder-password" placeholder="••••••••">
          </div>
          <div class="input-group">
            <label for="reg-role" data-i18n="portal-role">Portal Role</label>
            <select id="reg-role" class="select-field">
              <option value="STUDENT" data-i18n="role-student">Student</option>
              <option value="TEACHER" data-i18n="role-teacher">Teacher</option>
              <option value="COORDINATOR" data-i18n="role-coordinator">Coordinator</option>
            </select>
          </div>
          <div class="input-group" id="student-id-wrapper">
            <label for="reg-student-id" data-i18n="student-id-label">Student ID / JSN (12 Digits)</label>
            <input type="text" id="reg-student-id" data-i18n-placeholder="placeholder-studentid" placeholder="123456789012" maxlength="12">
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="register-btn">Register</button>
        </form>
        <div class="auth-switch">
          <span data-i18n="already-registered">Already registered?</span> <span id="to-login-btn" data-i18n="sign-in-link">Sign in</span>
        </div>
      </div>
    </main>
  </div>

  <script src="translations.js"></script>
  <script src="app.js"></script>
</body>
</html>
