version: "3.8"

services:
  backend-fastapi:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///nexus.db
      - JWT_SECRET=supersecretjwtkeyforfastapiapplicaton12345!
      - JWT_ALGORITHM=HS256
      - PORT=8000
    volumes:
      - ./backend-fastapi:/app

  backend-express:
    build:
      context: ./backend-express
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=supersecretjwtkeyforexpressapplicaton54321!
      - PORT=3000
    volumes:
      - ./backend-express:/app
      - /app/node_modules

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
